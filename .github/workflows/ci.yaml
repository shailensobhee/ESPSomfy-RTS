name: ESPSomfy-RTS

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - env: esp32dev
            name: ESP32
          - env: esp32c3
            name: ESP32-C3
          - env: esp32s3
            name: ESP32-S3

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.name }}
        run: pio run -e ${{ matrix.env }}

      - name: Build LittleFS image
        run: pio run -e ${{ matrix.env }} -t buildfs

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/firmware.elf
            .pio/build/${{ matrix.env }}/partitions.bin
            .pio/build/${{ matrix.env }}/bootloader.bin
            .pio/build/${{ matrix.env }}/littlefs.bin
          retention-days: 5
