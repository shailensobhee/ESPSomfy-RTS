; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32devdbg
src_dir = src

[env]
platform =  espressif32 @ 6.13.0
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
lib_deps = 
	bblanchon/ArduinoJson@^7.2.2
	lsatan/SmartRC-CC1101-Driver-Lib@^2.5.7
	knolleary/PubSubClient@^2.8
	esp32async/ESPAsyncWebServer@^3.10.3
	esp32async/AsyncTCP@^3.4.10
extra_scripts = 
	pre:app_version.py
	pre:minify.py
	post:archive_elf.py
board_build.filesystem = littlefs
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_ESP_COREDUMP_ENABLE_TO_FLASH=1
	-DCONFIG_ESP_COREDUMP_DATA_FORMAT_ELF=1
	-DCONFIG_ESP_COREDUMP_CHECKSUM_CRC32=1
	-DCONFIG_ESP_TASK_WDT_PANIC=1
	-DCONFIG_ESP_COREDUMP_DECODE_INFO=1
monitor_speed = 115200
monitor_filters = 
	time
	esp32_exception_decoder
	log2file

[env:esp32dev]
board = esp32dev
board_build.partitions = esp32_3MB.csv

[env:esp32devdbg]
board = esp32dev
build_type = debug
board_build.partitions = esp32_3MB.csv

[env:esp32c3]
board = esp32-c3-devkitm-1
board_build.partitions = esp32_3MB.csv

[env:esp32s3]
board = esp32-s3-devkitc-1

[env:esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32c6
build_type = debug
board_build.partitions = esp32_huge_app.csv
build_flags = 
	${env.build_flags}
	-include "driver/gpio.h"
lib_deps = 
	; Low-Level libs, frameowrks and drivers
	ESP32Async/AsyncTCP
	https://github.com/Viproz/SmartRC-CC1101-Driver-Lib.git
	; Commmunication Protocol
	links2004/WebSockets
	https://github.com/hmueller01/pubsubclient3.git
	; Data-Parsing
	bblanchon/ArduinoJson
	; High-level wrappers/servers
	ESP32Async/ESPAsyncWebServer

